name: Nightly Smoke Suite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      issues: write
    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      PLAYWRIGHT_HEADLESS: "true"
      AUTO_CREATE_SMOKE_ISSUE: ${{ vars.AUTO_CREATE_SMOKE_ISSUE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Start API server
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > smoke-server.log 2>&1 &
          sleep 8

      - name: Run smoke suite
        run: |
          python scripts/smoke_sites.py \
            --api-base http://127.0.0.1:8000/api/v1 \
            --profiles auto

      - name: Compare smoke trends
        run: |
          python scripts/compare_smoke_reports.py \
            --report-dir output/smoke_reports \
            --max-pass-rate-drop 0.10 \
            --max-empty-pages-increase 2.0 \
            --max-switches-increase 1.0 \
            --max-parser-scalar-drop 0.10 \
            --max-parser-structured-drop 0.10 \
            --allow-new-failures 0

      - name: Build smoke markdown summary
        if: always()
        run: |
          python scripts/smoke_trend_markdown.py \
            --report-dir output/smoke_reports \
            --out output/smoke_reports/latest-summary.md

      - name: Build regression issue payload
        if: failure() && env.AUTO_CREATE_SMOKE_ISSUE == 'true'
        run: |
          python scripts/smoke_issue_payload.py \
            --report-dir output/smoke_reports \
            --summary output/smoke_reports/latest-summary.md \
            --out output/smoke_reports/issue-payload.json

      - name: Create regression issue
        if: failure() && env.AUTO_CREATE_SMOKE_ISSUE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payloadPath = 'output/smoke_reports/issue-payload.json';
            if (!fs.existsSync(payloadPath)) {
              core.warning('Issue payload not found, skipping issue creation.');
              return;
            }
            const payload = JSON.parse(fs.readFileSync(payloadPath, 'utf8'));
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: payload.title,
              body: payload.body,
              labels: ['reliability', 'smoke-regression']
            });

      - name: Publish smoke summary
        if: always()
        run: |
          if [ -f output/smoke_reports/latest-summary.md ]; then
            cat output/smoke_reports/latest-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            output/smoke_reports/**
            smoke-server.log
